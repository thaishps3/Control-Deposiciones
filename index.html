<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Bio-Senior</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🩺</text></svg>">
    
    <style>
        :root { --blue: #1a73e8; --green: #34a853; --gray: #627690; --red: #ea4335; --light: #f8f9fa; }
        body { font-family: 'Segoe UI', sans-serif; background: #eaeff2; margin: 0; padding: 10px; }
        
        .card { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            max-width: 600px; 
            margin: auto; 
        }

        .main-title {
            text-align: center;
            color: var(--blue);
            font-size: 22px;
            font-weight: bold;
            margin: 5px 0 15px 0;
            text-transform: uppercase;
            border-bottom: 2px solid var(--light);
            padding-bottom: 8px;
        }

        /* CONFIGURACIÓN */
        .collapsible {
            background-color: var(--light);
            color: var(--gray);
            cursor: pointer;
            padding: 12px;
            width: 100%;
            border: 1px solid #ddd;
            text-align: left;
            font-size: 14px;
            font-weight: bold;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }

        .content-admin {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        /* REGISTRO */
        label { display: block; margin: 15px 0 5px; font-weight: bold; color: #444; font-size: 14px; }
        .abc-bar { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; justify-content: center; }
        .btn-l { padding: 8px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; min-width: 35px; }
        .btn-l.active { background: var(--blue); color: white; }
        
        #listaUsuarios { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; 
            max-height: 120px; overflow-y: auto; border: 1px solid #eee; 
            padding: 8px; background: #fafafa; border-radius: 8px;
        }

        .usuario-opt { padding: 10px; border: 1px solid #ddd; border-radius: 5px; cursor: pointer; background: #fff; font-size: 13px; }
        .usuario-opt.selected { background: var(--blue); color: white; font-weight: bold; }

        .grid-opts { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .btn-o { padding: 12px 5px; border: 2px solid #eee; border-radius: 8px; background: #fff; cursor: pointer; font-size: 12px; text-align: center; }
        .btn-o.active { border-color: var(--blue); background: #e8f0fe; font-weight: bold; }

        .btn-save { width: 100%; background: var(--green); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 16px; margin-top: 20px; cursor: pointer; font-weight: bold; }
        
        input, textarea, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 16px; background: white; }

        /* HISTORIAL */
        .filtros-historial { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .tabla-scroll { width: 100%; max-height: 400px; overflow-y: auto; margin-top: 10px; border: 1px solid #eee; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 480px; }
        th { position: sticky; top: 0; background: #f2f2f2; padding: 10px; z-index: 5; }
        td { border: 1px solid #ddd; padding: 10px 8px; text-align: left; }

        footer { 
            text-align: center; 
            font-size: 11px; 
            color: #888; 
            margin-top: 30px; 
            padding-top: 10px; 
            border-top: 1px solid #eee; 
            font-weight: bold;
        }

        /* IMPRESIÓN */
        #print-header { display: none; }

        @media print {
            body { background: white; padding: 0; }
            .no-print, .collapsible, .content-admin, .abc-bar, #listaUsuarios, .btn-save, hr { display: none !important; }
            .card { box-shadow: none; border: none; width: 100%; max-width: 100%; }
            .tabla-scroll { max-height: none; overflow: visible; }
            #print-header { display: block; text-align: center; margin-bottom: 20px; border-bottom: 2px solid #333; padding-bottom: 10px; }
            footer { color: #333; border-top: 1px solid #333; }
        }
    </style>
</head>
<body>

<div class="card">
    <div id="print-header">
        <h1 style="margin:0;">Reporte de Control Bio-Senior</h1>
        <p id="print-date-sub"></p>
        <p id="print-user-sub"></p>
    </div>

    <div class="main-title no-print">Control Bio-Senior</div>

    <button type="button" class="collapsible no-print">
        <span>👥 Gestión de Usuarios</span>
        <span id="arrow">▼</span>
    </button>
    <div class="content-admin no-print">
        <div style="padding:10px;">
            <div style="display:flex; gap:5px; margin-bottom:10px;">
                <input type="text" id="nuevoNombre" placeholder="Nombre del usuario...">
                <button onclick="agregarUsuario()" style="background:var(--blue); color:white; border:none; padding:10px; border-radius:6px;">+</button>
            </div>
            <div id="gestionLista" style="max-height:100px; overflow-y:auto; font-size:12px; border:1px solid #eee; padding:5px;"></div>
        </div>
    </div>

    <div class="no-print">
        <label>1. Seleccionar Usuario</label>
        <div class="abc-bar" id="abcBar"></div>
        <div id="listaUsuarios"></div>

        <label>2. Tipo de Deposición</label>
        <div class="grid-opts" id="depoSection">
            <div class="btn-o" onclick="selectDepo('Normal', this)">🌭Normal</div>
            <div class="btn-o" onclick="selectDepo('Blanda', this)">☁️Blanda</div>
            <div class="btn-o" onclick="selectDepo('Pastosa', this)">💩Pastosa</div>
            <div class="btn-o" onclick="selectDepo('Líquida', this)">💧Líquida</div>
            <div class="btn-o" onclick="selectDepo('Estreñida', this)">🪨Estreñida</div>
            <div class="btn-o" onclick="selectDepo('No', this)">❌No</div>
        </div>

        <label>3. Micción</label>
        <div class="grid-opts" id="micSection">
            <div class="btn-o" id="micSi" onclick="selectMic('Sí', this)">✅ Sí</div>
            <div class="btn-o" id="micNo" onclick="selectMic('No', this)">❌ No</div>
        </div>

        <label>4. Observaciones</label>
        <textarea id="obs" rows="2" placeholder="Notas adicionales..."></textarea>

        <button class="btn-save" onclick="guardar()">💾 GUARDAR REGISTRO</button>
    </div>

    <hr class="no-print" style="margin: 25px 0; border: 0; border-top: 1px solid #eee;">

    <div class="historial-section">
        <h3 style="font-size:16px; color:var(--blue); margin-bottom:10px;">Historial de Registros</h3>
        
        <div class="no-print filtros-historial">
            <div>
                <label style="margin-top:0; font-size:11px;">Fecha:</label>
                <input type="date" id="filtro" onchange="renderTabla()">
            </div>
            <div>
                <label style="margin-top:0; font-size:11px;">Usuario:</label>
                <select id="filtroUsuario" onchange="renderTabla()">
                    <option value="">Todos</option>
                </select>
            </div>
        </div>
        
        <button onclick="prepararImpresion()" class="no-print" style="width:100%; padding:12px; cursor:pointer; background: var(--gray); color:white; border:none; border-radius:8px; font-weight:bold; margin-bottom:10px;">🖨️ Imprimir Reporte</button>
        
        <div class="tabla-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Fecha y Hora</th>
                        <th>Usuario</th>
                        <th>Depo</th>
                        <th>Mic</th>
                        <th>Obs</th>
                        <th class="no-print"></th>
                    </tr>
                </thead>
                <tbody id="cuerpo"></tbody>
            </table>
        </div>
    </div>

    <footer>
        Diseñado por Thais Perruolo &copy; 2026
    </footer>
</div>

<script>
    let usuarios = JSON.parse(localStorage.getItem('pacientes_lista')) || ["Ejemplo"];
    let logs = JSON.parse(localStorage.getItem('logs_enfermeria')) || [];
    let registroActual = { nombre: "", depo: "", mic: "", obs: "" };
    let letraActiva = "";

    window.onload = () => {
        const hoy = new Date().toISOString().split('T')[0];
        document.getElementById('filtro').value = hoy;
        renderABC();
        renderGestion();
        actualizarSelectUsuarios();
        renderTabla();
    };

    function prepararImpresion() {
        const fF = document.getElementById('filtro').value;
        const fU = document.getElementById('filtroUsuario').value;
        document.getElementById('print-date-sub').innerText = fF ? "Fecha: " + new Date(fF).toLocaleDateString() : "Historial Completo";
        document.getElementById('print-user-sub').innerText = fU ? "Usuario: " + fU : "Todos los usuarios";
        window.print();
    }

    function actualizarSelectUsuarios() {
        const select = document.getElementById('filtroUsuario');
        const valAnterior = select.value;
        select.innerHTML = '<option value="">Todos</option>';
        usuarios.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p; opt.innerText = p;
            select.appendChild(opt);
        });
        select.value = valAnterior;
    }

    document.querySelector(".collapsible").addEventListener("click", function() {
        this.classList.toggle("active");
        const content = this.nextElementSibling;
        content.style.maxHeight = content.style.maxHeight ? null : content.scrollHeight + "px";
        document.getElementById("arrow").innerText = content.style.maxHeight ? "▲" : "▼";
    });

    function renderABC() {
        const bar = document.getElementById('abcBar');
        bar.innerHTML = "";
        "ABCDEFGHIJLMNOPQRSTV".split('').forEach(l => {
            const b = document.createElement('button');
            b.className = 'btn-l' + (letraActiva === l ? ' active' : '');
            b.innerText = l;
            b.onclick = () => { letraActiva = l; renderABC(); renderUsuarios(l); };
            bar.appendChild(b);
        });
    }

    function renderUsuarios(letra) {
        const box = document.getElementById('listaUsuarios');
        box.innerHTML = "";
        usuarios.filter(p => p.toUpperCase().startsWith(letra)).forEach(p => {
            const div = document.createElement('div');
            div.className = 'usuario-opt' + (registroActual.nombre === p ? ' selected' : '');
            div.innerText = p;
            div.onclick = () => { 
                registroActual.nombre = p; 
                document.querySelectorAll('.usuario-opt').forEach(d => d.classList.remove('selected'));
                div.classList.add('selected');
            };
            box.appendChild(div);
        });
    }

    function renderGestion() {
        document.getElementById('gestionLista').innerHTML = usuarios.map(p => `
            <div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #eee;">
                ${p} <span onclick="eliminarUsuario('${p}')" style="color:red; cursor:pointer;">✕</span>
            </div>`).join("");
        actualizarSelectUsuarios();
    }

    function agregarUsuario() {
        const n = document.getElementById('nuevoNombre').value.trim();
        if(n && !usuarios.includes(n)){
            usuarios.push(n); usuarios.sort();
            localStorage.setItem('pacientes_lista', JSON.stringify(usuarios));
            document.getElementById('nuevoNombre').value = "";
            renderGestion();
        }
    }

    function eliminarUsuario(n) {
        if(confirm(`¿Eliminar a ${n}?`)){
            usuarios = usuarios.filter(p => p !== n);
            localStorage.setItem('pacientes_lista', JSON.stringify(usuarios));
            renderGestion();
        }
    }

    function selectDepo(v, el) {
        registroActual.depo = v;
        document.querySelectorAll('#depoSection .btn-o').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if(v !== "No") selectMic('Sí', document.getElementById('micSi'));
    }

    function selectMic(v, el) {
        registroActual.mic = v;
        document.querySelectorAll('#micSection .btn-o').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }

    function guardar() {
        if(!registroActual.nombre || !registroActual.depo || !registroActual.mic) return alert("⚠️ Selecciona Usuario");
        const ahora = new Date();
        logs.push({
            id: Date.now(),
            fechaISO: ahora.toISOString().split('T')[0],
            fechaFull: ahora.toLocaleDateString('es-ES') + " " + ahora.toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'}),
            nombre: registroActual.nombre,
            depo: registroActual.depo,
            mic: registroActual.mic,
            obs: document.getElementById('obs').value
        });
        localStorage.setItem('logs_enfermeria', JSON.stringify(logs));
        registroActual.nombre = ""; registroActual.depo = ""; registroActual.mic = "";
        document.getElementById('obs').value = "";
        document.querySelectorAll('.btn-o').forEach(b => b.classList.remove('active'));
        renderUsuarios(letraActiva);
        renderTabla();
        alert("✅ Guardado");
    }

    function borrarLog(id) {
        if(confirm("¿Borrar registro?")) { logs = logs.filter(l => l.id !== id); localStorage.setItem('logs_enfermeria', JSON.stringify(logs)); renderTabla(); }
    }

    function renderTabla() {
        const cuerpo = document.getElementById('cuerpo');
        const fF = document.getElementById('filtro').value;
        const fU = document.getElementById('filtroUsuario').value;
        cuerpo.innerHTML = "";
        logs.filter(l => {
            const mF = fF ? l.fechaISO === fF : true;
            const mU = fU ? l.nombre === fU : true;
            return mF && mU;
        }).slice().reverse().forEach(l => {
            cuerpo.innerHTML += `<tr>
                <td>${l.fechaFull || l.fechaVis}</td>
                <td><b>${l.nombre}</b></td>
                <td>${l.depo}</td>
                <td>${l.mic}</td>
                <td style="max-width: 120px; overflow-wrap: break-word;">${l.obs || ""}</td>
                <td class="no-print"><button onclick="borrarLog(${l.id})" style="border:none; background:none; color:red; cursor:pointer;">✕</button></td>
            </tr>`;
        });
    }
</script>
</body>
</html>
